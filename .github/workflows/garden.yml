name: Water the Garden

on:
  schedule:
    - cron: '0 9 * * *'      # 09:00 UTC
    - cron: '30 12 * * *'    # 12:30 UTC
    - cron: '0 15 * * *'     # 15:00 UTC
    - cron: '0 18 * * *'     # 18:00 UTC
    - cron: '30 21 * * *'    # 21:30 UTC
  workflow_dispatch:
    inputs:
      force_commit:
        description: 'Force a commit (skip the randomizer)'
        default: 'false'
      backfill_date:
        description: 'Commit as if it were this date (YYYY-MM-DD)'
        default: ''

jobs:
  water:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Configure git identity
        run: |
          git config user.email "yashwanthbalaji.2408@gmail.com"
          git config user.name "Yashwanth2408"

      - name: Water the garden
        env:
          FORCE_COMMIT: ${{ inputs.force_commit }}
          BACKFILL_DATE: ${{ inputs.backfill_date }}
          GARDEN_SEED: ${{ github.run_number }}
        run: python garden/water.py

      - name: Push if changed
        run: |
          AHEAD=$(git log origin/main..HEAD --oneline | wc -l)
          if [ "$AHEAD" -gt 0 ]; then
            echo "Pushing $AHEAD new commit(s)."
            git push origin main
          else
            echo "Garden rests today — nothing to push."
          fi
